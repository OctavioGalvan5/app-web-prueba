<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Topes Previsionales</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bordo: #8b2463;
            --bordo2: #ae2d7c;
            --bordo-light: #fdf0f6;
            --azul: #8b2463;
            --azul-med: #ae2d7c;
            --azul-light: #fdf0f6;
            --ciruela: #8b2463;
            --ciruela-dark: #6b1a4a;
            --ciruela-light: rgba(139,36,99,0.08);
            --gris: #4a5568;
            --gris-light: #f7f8fa;
            --borde: #e4e7ec;
            --blanco: #ffffff;
            --shadow: 0 1px 6px rgba(0,0,0,0.08);
            --shadow2: 0 4px 16px rgba(0,0,0,0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--gris-light);
            color: #2d3748;
            min-height: 100vh;
        }

        .page-header {
            background: var(--azul);
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(139,36,99,0.3);
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .page-header .header-sub {
            color: rgba(255,255,255,0.65);
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }

        .card {
            background: white;
            border-radius: 8px;
            border: 1px solid var(--borde);
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: var(--azul);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--borde);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--ciruela);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .card-title i { color: var(--ciruela); font-size: 0.95rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gris);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1.5px solid #c9d3df;
            border-radius: 6px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.95rem;
            color: #2d3748;
            background: #f0f4f8;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--ciruela);
            background: white;
            box-shadow: 0 0 0 3px rgba(139,36,99,0.1);
        }

        /* TOOLTIP */
        .tooltip {
            position: relative;
            display: inline-flex;
            align-items: center;
            margin-left: 4px;
            color: var(--ciruela);
            cursor: help;
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 280px;
            background-color: var(--azul);
            color: white;
            text-align: left;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            font-weight: 400;
            font-size: 0.75rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            line-height: 1.5;
            text-transform: none;
            letter-spacing: 0;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--azul) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* CHECKBOXES */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--gris-light);
            border: 1px solid var(--borde);
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .checkbox-item:hover {
            border-color: var(--ciruela);
            background: var(--ciruela-light);
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            min-width: 16px;
            border: 2px solid var(--borde);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            background: white;
            flex-shrink: 0;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background-color: var(--ciruela);
            border-color: var(--ciruela);
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 11px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checkbox-item span {
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 400;
            color: #2d3748;
        }

        /* BOTÓN */
        .btn {
            padding: 11px 24px;
            border: none;
            border-radius: 6px;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--azul);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover { background: var(--azul-med); }

        .btn-submit {
            width: 100%;
            justify-content: center;
            padding: 13px 24px;
            font-size: 1rem;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .container { padding: 16px 12px 40px; }
            .card { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .checkbox-grid { grid-template-columns: 1fr; }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-98REL9JCTR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-98REL9JCTR');
    </script>
</head>
<body>

    <div class="page-header">
        <div>
            <h1>Calculadora de Topes Previsionales</h1>
            <span class="header-sub">T&amp;E · Análisis de topes máximos</span>
        </div>
        {% if ultima_fecha %}
        <div style="margin-left:auto; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:8px; padding:6px 14px; font-size:0.82rem; color:#fff; display:flex; align-items:center; gap:6px;">
            <i class="fas fa-calendar-check" style="opacity:0.85;"></i>
            Topes actualizados hasta <strong>{{ ultima_fecha }}</strong>
        </div>
        {% endif %}
    </div>

    <div class="container">
        <form action="/resultado_comparativa_tope_maximo" method="POST">

            <!-- Información del Caso -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-folder-open"></i> Información del Caso
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>
                            Autos
                            <span class="tooltip">
                                <i class="fas fa-info-circle"></i>
                                <span class="tooltip-text">Ingrese el nombre del caso o autos</span>
                            </span>
                        </label>
                        <input type="text" id="autos" name="Autos" required placeholder="Ej: García c/ ANSES">
                    </div>
                    <div class="form-group">
                        <label>
                            Expediente
                            <span class="tooltip">
                                <i class="fas fa-info-circle"></i>
                                <span class="tooltip-text">Ingrese el número de expediente</span>
                            </span>
                        </label>
                        <input type="text" id="expediente" name="Expediente" required placeholder="Ej: 12345/2023">
                    </div>
                </div>
            </div>

            <!-- Datos de Cálculo -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-calculator"></i> Datos de Cálculo
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>
                            Haber Reclamado ($)
                            <span class="tooltip">
                                <i class="fas fa-info-circle"></i>
                                <span class="tooltip-text">Ingrese el monto del haber reclamado</span>
                            </span>
                        </label>
                        <input type="number" id="haber_reclamado" name="haber_reclamado" step="0.01" required placeholder="Ej: 150000.00">
                    </div>
                    <div class="form-group">
                        <label>
                            Fecha a Comparar
                            <span class="tooltip">
                                <i class="fas fa-info-circle"></i>
                                <span class="tooltip-text">Seleccione la fecha para realizar la comparación</span>
                            </span>
                        </label>
                        <input type="date" id="segunda_fecha" name="segunda_fecha" required min="2018-01-01">
                    </div>
                </div>
            </div>

            <!-- Métodos de Movilidad -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-sliders-h"></i> Métodos de Movilidad a Comparar
                </div>
                <div class="checkbox-grid">
                    <label class="checkbox-item">
                        <input type="checkbox" id="caliva_mas_anses" name="caliva_mas_anses" value="true">
                        <span>Caliva más ANSES</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="badaro_mas_anses" name="badaro_mas_anses" value="true">
                        <span>Badaro más ANSES</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="badaro_mas_caliva" name="badaro_mas_caliva" value="true">
                        <span>Badaro más Caliva</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="remuneracion_maxima" name="remuneracion_maxima" value="true">
                        <span>Remuneración Máxima</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="ochentaidos_remuneracion_maxima" name="ochentaidos_remuneracion_maxima" value="true">
                        <span>82% Remuneración Máxima</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="rem_max_caliva_27551" name="rem_max_caliva_27551" value="true">
                        <span>Rem. Máx. Imponible Caliva Márquez 27551</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="martinez_mas_anses" name="martinez_mas_anses" value="true">
                        <span>Martínez más ANSES</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="anses_mas_palavecino" name="anses_mas_palavecino" value="true">
                        <span>ANSES más Palavecino</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="caliva_marquez_mas_palavecino" name="caliva_marquez_mas_palavecino" value="true">
                        <span>Caliva Márquez más Palavecino</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="Alanis_Colina" name="Alanis_Colina" value="true">
                        <span>Alanis mas Colina</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="badaro_cm_palavecino" name="badaro_cm_palavecino" value="true">
                        <span>Badaro + CM + ANSES</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="RM_Badaro_FP_CM_P_Anses" name="RM_Badaro_FP_CM_P_Anses" value="true">
                        <span>RM+Badaro+FP+CM+P+Anses</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" name="action" value="generar_pdf">
                <i class="fas fa-chart-bar"></i> Comparar Métodos
            </button>

        </form>
    </div>

    <script>
        const maxCheckboxes = 8;
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');

        allCheckboxes.forEach(function(checkbox) {
            checkbox.addEventListener('change', function() {
                const checkedCount = document.querySelectorAll('input[type="checkbox"]:checked').length;
                if (checkedCount > maxCheckboxes) {
                    this.checked = false;
                    Swal.fire({
                        icon: 'warning',
                        title: 'Límite alcanzado',
                        text: `Solo puede seleccionar hasta ${maxCheckboxes} métodos de movilidad para comparar al mismo tiempo.`,
                        confirmButtonColor: '#8b2463'
                    });
                }
            });
        });

        document.querySelector('form').addEventListener('submit', function(e) {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checked.length === 0) {
                e.preventDefault();
                Swal.fire({
                    icon: 'error',
                    title: 'Debe seleccionar al menos uno',
                    text: 'Por favor, seleccione al menos un método de movilidad para comparar.',
                    confirmButtonColor: '#8b2463'
                });
            } else if (checked.length > maxCheckboxes) {
                e.preventDefault();
                Swal.fire({
                    icon: 'warning',
                    title: 'Demasiadas opciones',
                    text: `Ha seleccionado más de ${maxCheckboxes} métodos de movilidad. Por favor, reduzca su selección.`,
                    confirmButtonColor: '#8b2463'
                });
            }
        });
    </script>
</body>
</html>
